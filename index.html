<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>JET - Registro de Asistencia</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="container">
    <header class="brand">
      <h1>JET</h1>
      <p class="tagline">Registro de Asistencia</p>
    </header>

    <!-- LOGIN VIEW -->
    <section id="view-login" class="view active">
      <h2>Identifícate</h2>
      <label class="field">
        <span>Tu nombre</span>
        <select id="select-empleado" required>
          <option value="">— Selecciona —</option>
        </select>
      </label>
      <label class="field">
        <span>Punto de trabajo de hoy</span>
        <select id="select-parque" required>
          <option value="">— Selecciona —</option>
        </select>
      </label>
      <button class="btn btn-primary" id="btn-continuar">Continuar</button>
    </section>

    <!-- MAIN VIEW -->
    <section id="view-main" class="view">
      <div class="user-bar">
        <div>
          <strong id="display-empleado"></strong>
          <small id="display-parque"></small>
        </div>
        <button class="btn-link" id="btn-logout">Cambiar</button>
      </div>

      <div class="status-card" id="status-card">
        <div class="status-icon" id="status-icon">⏸</div>
        <div class="status-text" id="status-text">Cargando…</div>
        <div class="status-times" id="status-times"></div>
      </div>

      <div class="actions" id="actions"></div>

      <p class="info-line" id="info-line"></p>
    </section>

    <!-- LOADING OVERLAY -->
    <div id="overlay" class="overlay hidden">
      <div class="spinner"></div>
      <p id="overlay-text">Procesando…</p>
    </div>

    <!-- HIDDEN PHOTO INPUT -->
    <input type="file" id="photo-input" accept="image/*" capture="user" hidden>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
